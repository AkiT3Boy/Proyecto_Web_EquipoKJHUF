<div class="modal-overlay" *ngIf="isOpen" (click)="close()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <!-- Loading Overlay -->
    <div *ngIf="loading" class="loading-overlay">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">Actualizando contraseña...</div>
      </div>
    </div>

    <!-- Modal Header -->
    <div class="modal-header">
      <div class="modal-header-content">
        <h2 class="modal-title">
          <div class="modal-icon">
            <i class="fas fa-key"></i>
          </div>
          <span>Cambiar Contraseña</span>
        </h2>
        <button class="close-btn" (click)="close()" type="button" [disabled]="loading">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Form -->
    <form (ngSubmit)="changePassword()" class="change-password-form">
      <div class="form-description">
        <p>Para mantener la seguridad de tu cuenta, elige una contraseña fuerte y única.</p>
      </div>

      <!-- Old Password -->
      <div class="form-group">
        <label for="oldPassword">
          <i class="fas fa-lock"></i> Contraseña Actual
        </label>
        <div class="input-wrapper">
          <input
            type="password"
            id="oldPassword"
            [(ngModel)]="oldPassword"
            name="oldPassword"
            placeholder="Ingresa tu contraseña actual"
            [disabled]="loading"
            required
          >
          <i class="fas fa-lock input-icon"></i>
        </div>
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label for="newPassword">
          <i class="fas fa-lock-open"></i> Nueva Contraseña
        </label>
        <div class="input-wrapper">
          <input
            type="password"
            id="newPassword"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="Ingresa la nueva contraseña (mín. 4 caracteres)"
            [disabled]="loading"
            required
            minlength="4"
          >
          <i class="fas fa-lock-open input-icon"></i>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">
          <i class="fas fa-shield-alt"></i> Confirmar Nueva Contraseña
        </label>
        <div class="input-wrapper">
          <input
            type="password"
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirma tu nueva contraseña"
            [disabled]="loading"
            required
            minlength="4"
          >
          <i class="fas fa-shield-alt input-icon"></i>
        </div>
      </div>

      <!-- Error Alert -->
      <div *ngIf="error" class="alert alert-danger">
        <i class="fas fa-exclamation-triangle"></i>
        <div class="alert-content">
          <div class="alert-title">Error</div>
          <div class="alert-message">{{ error }}</div>
        </div>
      </div>

      <!-- Success Alert -->
      <div *ngIf="success" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <div class="alert-content">
          <div class="alert-title">¡Éxito!</div>
          <div class="alert-message">{{ success }}</div>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="close()"
          [disabled]="loading"
        >
          <i class="fas fa-times"></i> Cancelar
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading || !oldPassword || !newPassword || !confirmPassword"
        >
          <span *ngIf="loading">
            <i class="fas fa-spinner fa-spin"></i> Actualizando...
          </span>
          <span *ngIf="!loading">
            <i class="fas fa-save"></i> Guardar Cambios
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
