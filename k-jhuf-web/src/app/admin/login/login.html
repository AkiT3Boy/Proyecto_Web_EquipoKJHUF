<div class="login-container">
  <div class="login-card">
    <!-- Logo/Título -->
    <div class="login-header">
      <i class="fas fa-lock-open"></i>
      <h1>K-JHUF Admin</h1>
      <p *ngIf="!isSetupMode">Acceso Restringido</p>
      <p *ngIf="isSetupMode">Configurar Contraseña</p>
    </div>

    <!-- Formulario de Setup (Primera vez) -->
    <form (ngSubmit)="setupPassword()" *ngIf="isSetupMode" class="login-form">
      <div class="form-group">
        <label for="password">
          <i class="fas fa-key"></i> Nueva Contraseña
        </label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingresa una contraseña (mín. 4 caracteres)"
          [disabled]="loading"
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">
          <i class="fas fa-key"></i> Confirmar Contraseña
        </label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirma tu contraseña"
          [disabled]="loading"
        >
      </div>

      <!-- Mensajes -->
      <div *ngIf="error" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      <div *ngIf="success" class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ success }}
      </div>

      <button 
        type="submit" 
        class="btn btn-primary btn-block"
        [disabled]="loading"
      >
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin"></i> Configurando...
        </span>
        <span *ngIf="!loading">
          <i class="fas fa-cog"></i> Configurar Contraseña
        </span>
      </button>
    </form>

    <!-- Formulario de Login (Ya configurado) -->
    <form (ngSubmit)="login()" *ngIf="!isSetupMode && passwordConfigured" class="login-form">
      <div class="form-group">
        <label for="loginPassword">
          <i class="fas fa-lock"></i> Contraseña
        </label>
        <input
          type="password"
          id="loginPassword"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          [disabled]="loading"
          (focus)="clearMessages()"
        >
      </div>

      <!-- Mensajes -->
      <div *ngIf="error" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      <div *ngIf="success" class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ success }}
      </div>

      <button 
        type="submit" 
        class="btn btn-primary btn-block"
        [disabled]="loading"
      >
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin"></i> Verificando...
        </span>
        <span *ngIf="!loading">
          <i class="fas fa-sign-in-alt"></i> Acceder al Admin
        </span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>🔐 Área segura de administración de K-JHUF</p>
    </div>
  </div>
</div>
