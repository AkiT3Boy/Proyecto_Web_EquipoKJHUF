<aside class="sidebar" [class.sidebar--open]="menuAbierto">
  <button class="sidebar__toggle" type="button" (click)="toggleMenu()" aria-label="Abrir menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="sidebar__brand">
    <span class="sidebar__dot"></span>
    <div>
      <a class="sidebar__title" routerLink="/" (click)="cerrarMenu()">K-JHUF</a>
      <p class="sidebar__subtitle">Snacks premium</p>
    </div>
  </div>

  <nav class="sidebar__nav">
    <a
      *ngFor="let enlace of enlaces"
      class="sidebar__link"
      [routerLink]="enlace.ruta"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: enlace.ruta === '/' }"
      (click)="cerrarMenu()"
    >
      {{ enlace.label }}
    </a>
  </nav>

  <button class="sidebar__cart" type="button" (click)="abrirCarrito()">
    Carrito
    <span *ngIf="totalItems">{{ totalItems }}</span>
  </button>

  <a class="sidebar__admin" routerLink="/admin" routerLinkActive="sidebar__admin--active" (click)="cerrarMenu()">
    <span class="sidebar__dot sidebar__dot--admin"></span>
    Admin
  </a>
</aside>
