<section class="contacto-layout">
  <article class="contacto-card contacto-card--primary">
    <p class="label">Contacto</p>
    <h1>Visitanos en Poza Rica</h1>
    <p>
      Si quieres visitarnos o pedir ubicacion, aqui te dejamos la direccion, el telefono y el mapa
      para que llegues facil.
    </p>

    <div class="contacto-list">
      <div class="contacto-item" *ngFor="let dato of datos">
        <span>{{ dato.titulo }}</span>
        <strong>{{ dato.valor }}</strong>
      </div>
    </div>
  </article>

  <article class="contacto-card contacto-card--map">
    <iframe
      [src]="mapaUrl"
      width="100%"
      height="100%"
      style="border: 0"
      loading="lazy"
      allowfullscreen
      referrerpolicy="no-referrer-when-downgrade"
      title="Mapa de K-JHUF Snacks"
    ></iframe>
  </article>
</section>
