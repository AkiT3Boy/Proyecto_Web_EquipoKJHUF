<div class="container">

  <h1 class="page-title">🍽️ Catálogo de Productos</h1>

  <div class="products-grid">

    <div class="card h-100" *ngFor="let p of productos; trackBy: trackById">

      <img [src]="p.imagen || 'https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=400'"
           class="card-img-top"
           [alt]="p.nombre">

      <!-- Promotion Badge -->
      <div class="promotion-badge" *ngIf="p.promocion">
        <span *ngIf="p.promocion?.tipo=='porcentaje'">{{p.promocion.valor}}% OFF</span>
        <span *ngIf="p.promocion?.tipo=='precio'">Precio Especial</span>
        <span *ngIf="p.promocion?.tipo=='2x1'">2x1</span>
        <span *ngIf="p.promocion?.tipo=='combo'">Combo</span>
      </div>

      <div class="card-body">

        <h5 class="card-title">{{p.nombre}}</h5>

        <p class="card-text">{{p.descripcion}}</p>

        <div class="price-section">
          <!-- PRECIO NORMAL -->
          <div *ngIf="!p.promocion">
            <h4 class="price-regular">${{p.precio}}</h4>
          </div>

          <!-- PRECIO CON PROMOCION -->
          <div *ngIf="p.promocion">
            <div class="price-discount">${{precioFinal(p)}}</div>
            <div class="price-old">${{p.precio}}</div>
          </div>
        </div>

        <button class="btn btn-primary">
          🛒 Agregar al Carrito
        </button>

      </div>

    </div>

  </div>

</div>
