<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" stroke="#fff" stroke-width="32"/>

  <!-- Cookie icon -->
  <g transform="translate(256, 256)">
    <!-- Main cookie body -->
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="#8B4513" stroke="#654321" stroke-width="4"/>

    <!-- Chocolate chips -->
    <circle cx="-40" cy="-20" r="8" fill="#2c1810"/>
    <circle cx="30" cy="-30" r="6" fill="#2c1810"/>
    <circle cx="-20" cy="25" r="7" fill="#2c1810"/>
    <circle cx="45" cy="15" r="5" fill="#2c1810"/>
    <circle cx="0" cy="-40" r="6" fill="#2c1810"/>
    <circle cx="-50" cy="10" r="4" fill="#2c1810"/>
    <circle cx="20" cy="35" r="5" fill="#2c1810"/>

    <!-- Crack lines -->
    <path d="M-60,-10 Q-30,-25 0,-15" stroke="#654321" stroke-width="2" fill="none"/>
    <path d="M20,20 Q50,5 70,-5" stroke="#654321" stroke-width="2" fill="none"/>
    <path d="M-30,40 Q0,50 30,45" stroke="#654321" stroke-width="2" fill="none"/>
  </g>

  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">K-JHUF</text>
</svg>